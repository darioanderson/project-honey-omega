name: Omega Heartbeat

# THE CLOCK: Runs every 12 hours
on:
  schedule:
    # Runs at minute 0 of every 12th hour (00:00 and 12:00 UTC)
    - cron: '0 */12 * * *'
  
  # Allows you to start it manually from the Actions tab
  workflow_dispatch:

jobs:
  control_queen:
    runs-on: ubuntu-latest

    steps:
      # 1. Get the code from the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Set up Python environment
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. Install Kaggle CLI
      - name: Install Kaggle API
        run: pip install kaggle

      # 4. Configure Kaggle Credentials (Secure)
      - name: Connect to Kaggle
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          echo "👑 HEARTBEAT: Connecting to Kaggle..."
          mkdir -p ~/.kaggle
          echo "{\"username\":\"$KAGGLE_USERNAME\",\"key\":\"$KAGGLE_KEY\"}" > ~/.kaggle/kaggle.json
          echo "✅ Connection Established."

          # 5. COMMAND KAGGLE TO START TRAINING (Updated Version)
      - name: Launch Training Session
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          echo "🚀 COMMANDING KAGGLE TO START TRAINING..."
          
          # CHANGE 'dushi2' TO YOUR USERNAME BELOW:
          REPO="https://github.com/dushi2/project-honey-omega.git"
          
          # Updated Command: We just push the Repo URL. 
          # It reads kernel-metadata.json automatically from the repo.
          kaggle kernels push $REPO
          
          echo "✅ COMMAND SENT. QUEEN IS NOW TRAINING."
